[flake8]
max-line-length = 88
extend-ignore = E203, W503
exclude =
    .git,
    __pycache__,
    .venv,
    alembic_migrations,
    .pytest_cache
per-file-ignores =
    # load_dotenv() must run before other imports
    app/main.py:E402
    # test env vars must be set before app imports
    tests/conftest.py:E402