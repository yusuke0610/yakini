services:
  api:
    build: ./backend
    container_name: devforge-api
    restart: unless-stopped
    environment:
      SQLITE_DB_PATH: /data/devforge.sqlite
      CORS_ORIGINS: http://localhost:5173
      SECRET_KEY: ${SECRET_KEY}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/data

volumes:
  sqlite_data:
