services:
  api:
    build: ./backend
    container_name: devforge-api
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SQLITE_DB_PATH: ${SQLITE_DB_PATH}
      CORS_ORIGINS: ${CORS_ORIGINS}
      SECRET_KEY: ${SECRET_KEY}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      LLM_PROVIDER: ${LLM_PROVIDER}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT}
      UPSTASH_REDIS_URL: ${UPSTASH_REDIS_URL}
      UPSTASH_REDIS_TOKEN: ${UPSTASH_REDIS_TOKEN}
      COOKIE_SECURE: ${COOKIE_SECURE}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      VERTEX_PROJECT_ID: ${VERTEX_PROJECT_ID}
      VERTEX_LOCATION: ${VERTEX_LOCATION}
      VERTEX_MODEL: ${VERTEX_MODEL}
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
      GCS_DB_OBJECT: ${GCS_DB_OBJECT}
      TASK_RUNNER: ${TASK_RUNNER}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      CLOUD_TASKS_QUEUE: ${CLOUD_TASKS_QUEUE}
      CLOUD_TASKS_LOCATION: ${CLOUD_TASKS_LOCATION}
      CLOUD_TASKS_SERVICE_URL: ${CLOUD_TASKS_SERVICE_URL}
      CLOUD_TASKS_SERVICE_ACCOUNT: ${CLOUD_TASKS_SERVICE_ACCOUNT}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data

  ollama:
    image: ollama/ollama:latest
    container_name: devforge-ollama
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: 30m
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "ps"]
      interval: 5s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    container_name: devforge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  ollama_data:
