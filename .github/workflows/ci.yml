name: CI

on:
  pull_request:
    branches:
      - main
      - stg
      - dev
  push:
    branches:
      - main
      - stg
      - dev

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      app: ${{ steps.filter.outputs.app }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed application files
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'frontend/**'
              - 'backend/**'
              - '.github/workflows/ci.yml'

  test:
    runs-on: ubuntu-latest
    needs: detect-changes
    timeout-minutes: 15

    steps:
      - name: No application changes
        if: needs.detect-changes.outputs.app != 'true'
        run: echo "No application changes detected. Skipping frontend/backend CI."

      - name: Checkout
        if: needs.detect-changes.outputs.app == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: needs.detect-changes.outputs.app == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: needs.detect-changes.outputs.app == 'true'
        run: npm ci --prefix frontend

      - name: Lint frontend
        if: needs.detect-changes.outputs.app == 'true'
        run: npm run lint --prefix frontend

      - name: Run frontend tests
        if: needs.detect-changes.outputs.app == 'true'
        run: npm run test --prefix frontend

      - name: Build frontend
        if: needs.detect-changes.outputs.app == 'true'
        run: npm run build --prefix frontend

      - name: Setup Python
        if: needs.detect-changes.outputs.app == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        if: needs.detect-changes.outputs.app == 'true'
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint backend
        if: needs.detect-changes.outputs.app == 'true'
        working-directory: backend
        run: python -m ruff check app tests alembic_migrations

      - name: Run backend tests
        if: needs.detect-changes.outputs.app == 'true'
        working-directory: backend
        run: python -m pytest -q tests

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [detect-changes, test]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push' && needs.detect-changes.outputs.app == 'true'
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Firebase Hosting
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --project devforge-dev-20260311

  deploy-backend:
    runs-on: ubuntu-latest
    needs: [detect-changes, test]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push' && needs.detect-changes.outputs.app == 'true'
    timeout-minutes: 20
    env:
      PROJECT_ID: devforge-dev-20260311
      REGION: asia-northeast1
      REPO: devforge-dev
      SERVICE: devforge-dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}
          docker build -t ${IMAGE}:${{ github.sha }} -t ${IMAGE}:latest backend/
          docker push ${IMAGE}:${{ github.sha }}
          docker push ${IMAGE}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --quiet

  # stg フロントエンドデプロイ（stg ブランチ push 時）
  # TODO: GitHub に登録が必要: GCP_SA_KEY_STG, VITE_API_BASE_URL_STG
  deploy-frontend-stg:
    runs-on: ubuntu-latest
    needs: [detect-changes, test]
    if: github.ref == 'refs/heads/stg' && github.event_name == 'push' && needs.detect-changes.outputs.app == 'true'
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL_STG }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_STG }}

      - name: Deploy to Firebase Hosting (stg)
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --project devforge-stg-20260404

  # stg バックエンドデプロイ（stg ブランチ push 時）
  deploy-backend-stg:
    runs-on: ubuntu-latest
    needs: [detect-changes, test]
    if: github.ref == 'refs/heads/stg' && github.event_name == 'push' && needs.detect-changes.outputs.app == 'true'
    timeout-minutes: 20
    env:
      PROJECT_ID: devforge-stg-20260404
      REGION: asia-northeast1
      REPO: devforge-stg
      SERVICE: devforge-stg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_STG }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}
          docker build -t ${IMAGE}:${{ github.sha }} -t ${IMAGE}:latest backend/
          docker push ${IMAGE}:${{ github.sha }}
          docker push ${IMAGE}:latest

      - name: Deploy to Cloud Run (stg)
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --quiet

  # prod フロントエンドデプロイ（main ブランチ push 時）
  # TODO: GitHub に登録が必要: GCP_SA_KEY_PROD, VITE_API_BASE_URL_PROD
  deploy-frontend-prod:
    runs-on: ubuntu-latest
    needs: [detect-changes, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.detect-changes.outputs.app == 'true'
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL_PROD }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_PROD }}

      - name: Deploy to Firebase Hosting (prod)
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --project devforge-prod-20260404

  # prod バックエンドデプロイ（main ブランチ push 時）
  deploy-backend-prod:
    runs-on: ubuntu-latest
    needs: [detect-changes, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.detect-changes.outputs.app == 'true'
    timeout-minutes: 20
    env:
      PROJECT_ID: devforge-prod-20260404
      REGION: asia-northeast1
      REPO: devforge-prod
      SERVICE: devforge-prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_PROD }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}
          docker build -t ${IMAGE}:${{ github.sha }} -t ${IMAGE}:latest backend/
          docker push ${IMAGE}:${{ github.sha }}
          docker push ${IMAGE}:latest

      - name: Deploy to Cloud Run (prod)
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --quiet
