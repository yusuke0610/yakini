name: OpenTofu CI

on:
  pull_request:
    branches:
      - main
      - stg
      - dev
  push:
    branches:
      - main
      - stg
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: opentofu-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_IN_AUTOMATION: "true"
  TF_VAR_alert_email: "ci-placeholder@example.com"

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      dev: ${{ steps.filter.outputs.dev }}
      stg: ${{ steps.filter.outputs.stg }}
      prod: ${{ steps.filter.outputs.prod }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed environments
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'infra/**'
              - '.github/workflows/opentofu-ci.yml'
            dev:
              - 'infra/environments/dev/**'
              - 'infra/modules/**'
            stg:
              - 'infra/environments/stg/**'
              - 'infra/modules/**'
            prod:
              - 'infra/environments/prod/**'
              - 'infra/modules/**'

  opentofu-fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: detect-changes

    steps:
      - name: No OpenTofu changes
        if: needs.detect-changes.outputs.infra != 'true'
        run: echo "No OpenTofu changes detected. Skipping format check."

      - name: Checkout
        if: needs.detect-changes.outputs.infra == 'true'
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        if: needs.detect-changes.outputs.infra == 'true'
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.8.5

      - name: OpenTofu format check
        if: needs.detect-changes.outputs.infra == 'true'
        run: tofu fmt -check -recursive infra

  opentofu-validate-dev:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [opentofu-fmt, detect-changes]

    steps:
      - name: No dev OpenTofu changes
        if: needs.detect-changes.outputs.dev != 'true'
        run: echo "No dev/module OpenTofu changes detected. Skipping validation."

      - name: Checkout
        if: needs.detect-changes.outputs.dev == 'true'
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        if: needs.detect-changes.outputs.dev == 'true'
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.8.5

      - name: OpenTofu init (no backend)
        if: needs.detect-changes.outputs.dev == 'true'
        run: tofu -chdir=infra/environments/dev init -backend=false -input=false

      - name: OpenTofu validate
        if: needs.detect-changes.outputs.dev == 'true'
        run: tofu -chdir=infra/environments/dev validate

  opentofu-validate-stg:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [opentofu-fmt, detect-changes]

    steps:
      - name: No stg OpenTofu changes
        if: needs.detect-changes.outputs.stg != 'true'
        run: echo "No stg/module OpenTofu changes detected. Skipping validation."

      - name: Checkout
        if: needs.detect-changes.outputs.stg == 'true'
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        if: needs.detect-changes.outputs.stg == 'true'
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.8.5

      - name: OpenTofu init (no backend)
        if: needs.detect-changes.outputs.stg == 'true'
        run: tofu -chdir=infra/environments/stg init -backend=false -input=false

      - name: OpenTofu validate
        if: needs.detect-changes.outputs.stg == 'true'
        run: tofu -chdir=infra/environments/stg validate

  opentofu-validate-prod:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [opentofu-fmt, detect-changes]

    steps:
      - name: No prod OpenTofu changes
        if: needs.detect-changes.outputs.prod != 'true'
        run: echo "No prod/module OpenTofu changes detected. Skipping validation."

      - name: Checkout
        if: needs.detect-changes.outputs.prod == 'true'
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        if: needs.detect-changes.outputs.prod == 'true'
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.8.5

      - name: OpenTofu init (no backend)
        if: needs.detect-changes.outputs.prod == 'true'
        run: tofu -chdir=infra/environments/prod init -backend=false -input=false

      - name: OpenTofu validate
        if: needs.detect-changes.outputs.prod == 'true'
        run: tofu -chdir=infra/environments/prod validate
